<svg width="900" height="330" viewBox="0 0 900 330" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="330" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#020408"/>
      <stop offset="100%" stop-color="#060e1a"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0" y1="0" x2="500" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="45%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#7b2fff"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="50%" stop-color="#7b2fff"/>
      <stop offset="100%" stop-color="#ff3cac"/>
    </linearGradient>
    <filter id="gc" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gs" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00f0ff" stroke-width="0.3" stroke-opacity="0.07"/>
    </pattern>
    <clipPath id="card"><rect width="900" height="330" rx="12"/></clipPath>
  </defs>

  <!-- BG -->
  <rect width="900" height="330" rx="12" fill="url(#bg)"/>
  <rect width="900" height="330" fill="url(#grid)" clip-path="url(#card)"/>

  <!-- Ambient glow blobs -->
  <ellipse cx="0" cy="165" rx="180" ry="220" fill="#00f0ff" fill-opacity="0.035" clip-path="url(#card)"/>
  <ellipse cx="900" cy="165" rx="200" ry="250" fill="#7b2fff" fill-opacity="0.045" clip-path="url(#card)"/>
  <ellipse cx="715" cy="155" rx="135" ry="135" fill="#00f0ff" fill-opacity="0.025" clip-path="url(#card)"/>

  <!-- Scanline -->
  <rect width="900" height="1.5" fill="#00f0ff" fill-opacity="0.05" clip-path="url(#card)">
    <animateTransform attributeName="transform" type="translate" from="0,-5" to="0,340" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- Top + bottom accent borders -->
  <rect width="900" height="1.5" fill="url(#lineGrad)" opacity="0.75"/>
  <rect y="328.5" width="900" height="1.5" fill="url(#lineGrad)" opacity="0.35"/>

  <!-- Corner brackets TL -->
  <path d="M 0 32 L 0 4 Q 0 0 4 0 L 32 0" stroke="#00f0ff" stroke-width="1.5" fill="none">
    <animate attributeName="stroke-opacity" values="0.7;1;0.7" dur="2.5s" repeatCount="indefinite"/>
  </path>
  <!-- TR -->
  <path d="M 868 0 L 896 0 Q 900 0 900 4 L 900 32" stroke="#7b2fff" stroke-width="1.5" fill="none">
    <animate attributeName="stroke-opacity" values="0.7;1;0.7" dur="2.5s" begin="0.6s" repeatCount="indefinite"/>
  </path>
  <!-- BL -->
  <path d="M 0 298 L 0 326 Q 0 330 4 330 L 32 330" stroke="#7b2fff" stroke-width="1.5" fill="none">
    <animate attributeName="stroke-opacity" values="0.5;0.85;0.5" dur="2.5s" begin="1.2s" repeatCount="indefinite"/>
  </path>
  <!-- BR -->
  <path d="M 868 330 L 896 330 Q 900 330 900 326 L 900 298" stroke="#00f0ff" stroke-width="1.5" fill="none">
    <animate attributeName="stroke-opacity" values="0.5;0.85;0.5" dur="2.5s" begin="1.8s" repeatCount="indefinite"/>
  </path>

  <!-- Data stream lines (matrix effect) right edge -->
  <text x="855" y="-20" font-family="monospace" font-size="9" fill="#00f0ff" fill-opacity="0" writing-mode="tb" letter-spacing="4">10110100110010110100</text>
  <!-- stream 1 -->
  <g opacity="0">
    <text x="847" y="0" font-family="monospace" font-size="9" fill="#00f0ff" writing-mode="tb">01110100110</text>
    <animate attributeName="opacity" values="0;0.18;0.18;0" dur="7s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" from="0,-120" to="0,450" dur="7s" repeatCount="indefinite"/>
  </g>
  <g opacity="0">
    <text x="862" y="0" font-family="monospace" font-size="9" fill="#7b2fff" writing-mode="tb">11001010111</text>
    <animate attributeName="opacity" values="0;0.14;0.14;0" dur="9s" begin="2s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" from="0,-80" to="0,450" dur="9s" begin="2s" repeatCount="indefinite"/>
  </g>

  <!-- ======== LEFT CONTENT ======== -->

  <!-- Small label line -->
  <rect x="50" y="63" width="28" height="1" fill="#00f0ff" opacity="0.7"/>
  <text x="86" y="68" font-family="Courier New,monospace" font-size="10" fill="#00f0ff" fill-opacity="0.8" letter-spacing="3.5">FULL STACK DEVELOPER</text>

  <!-- BHUSHAN -->
  <text x="46" y="136" font-family="'Segoe UI Black','Arial Black',sans-serif" font-size="60" font-weight="900" fill="url(#nameGrad)" filter="url(#gs)" letter-spacing="-1">BHUSHAN</text>

  <!-- INGALE -->
  <text x="46" y="195" font-family="'Segoe UI Black','Arial Black',sans-serif" font-size="60" font-weight="900" fill="url(#nameGrad)" filter="url(#gs)" letter-spacing="-1">INGALE</text>

  <!-- Tagline -->
  <text x="48" y="222" font-family="Courier New,monospace" font-size="11.5" fill="#7b2fff" fill-opacity="0.95">&#x25B8; Building scalable web apps &amp; AI/ML platforms from India &#x1F1EE;&#x1F1F3;</text>

  <!-- Stat box 1 — 30+ -->
  <rect x="48" y="246" width="106" height="58" rx="3" fill="#00f0ff" fill-opacity="0.04" stroke="#00f0ff" stroke-width="0.6" stroke-opacity="0.28"/>
  <text x="101" y="271" font-family="'Segoe UI',Arial,sans-serif" font-size="27" font-weight="900" fill="#00f0ff" text-anchor="middle" filter="url(#gc)">30+</text>
  <text x="101" y="289" font-family="Courier New,monospace" font-size="7.5" fill="#3a5060" text-anchor="middle" letter-spacing="1.5">APPS SHIPPED</text>

  <!-- Stat box 2 — 10 -->
  <rect x="164" y="246" width="106" height="58" rx="3" fill="#7b2fff" fill-opacity="0.06" stroke="#7b2fff" stroke-width="0.6" stroke-opacity="0.28"/>
  <text x="217" y="271" font-family="'Segoe UI',Arial,sans-serif" font-size="27" font-weight="900" fill="#7b2fff" text-anchor="middle">10</text>
  <text x="217" y="289" font-family="Courier New,monospace" font-size="7.5" fill="#3a5060" text-anchor="middle" letter-spacing="1.5">AI/ML MODELS</text>

  <!-- Stat box 3 — 3 -->
  <rect x="280" y="246" width="106" height="58" rx="3" fill="#ff3cac" fill-opacity="0.05" stroke="#ff3cac" stroke-width="0.6" stroke-opacity="0.25"/>
  <text x="333" y="271" font-family="'Segoe UI',Arial,sans-serif" font-size="27" font-weight="900" fill="#ff3cac" text-anchor="middle">3</text>
  <text x="333" y="289" font-family="Courier New,monospace" font-size="7.5" fill="#3a5060" text-anchor="middle" letter-spacing="1.5">PROJECT SUITES</text>

  <!-- Stat box 4 — OPEN -->
  <rect x="396" y="246" width="106" height="58" rx="3" fill="#ffd700" fill-opacity="0.04" stroke="#ffd700" stroke-width="0.6" stroke-opacity="0.2"/>
  <circle cx="404" cy="262" r="4" fill="#00e676">
    <animate attributeName="fill-opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="420" y="266" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#ffd700">OPEN</text>
  <text x="401" y="281" font-family="Courier New,monospace" font-size="7.5" fill="#ffd700" fill-opacity="0.7">TO WORK</text>
  <text x="401" y="293" font-family="Courier New,monospace" font-size="6.5" fill="#3a5060" letter-spacing="0.5">AVAILABLE NOW</text>

  <!-- ======== RIGHT — ORB ======== -->

  <!-- Background glow pulse -->
  <circle cx="715" cy="155" r="130" fill="#00f0ff" fill-opacity="0.015">
    <animate attributeName="fill-opacity" values="0.015;0.04;0.015" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="r" values="130;138;130" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Ring 1 — outer dashed rotating -->
  <circle cx="715" cy="155" r="122" fill="none" stroke="#00f0ff" stroke-width="0.7" stroke-opacity="0.18" stroke-dasharray="6 12">
    <animateTransform attributeName="transform" type="rotate" from="0 715 155" to="360 715 155" dur="28s" repeatCount="indefinite"/>
  </circle>

  <!-- Ring 2 — middle counter-rotating -->
  <circle cx="715" cy="155" r="92" fill="none" stroke="#7b2fff" stroke-width="0.7" stroke-opacity="0.22" stroke-dasharray="10 6">
    <animateTransform attributeName="transform" type="rotate" from="360 715 155" to="0 715 155" dur="20s" repeatCount="indefinite"/>
  </circle>

  <!-- Ring 3 — inner fast rotating -->
  <circle cx="715" cy="155" r="64" fill="none" stroke="#ff3cac" stroke-width="0.7" stroke-opacity="0.28" stroke-dasharray="4 8">
    <animateTransform attributeName="transform" type="rotate" from="0 715 155" to="360 715 155" dur="12s" repeatCount="indefinite"/>
  </circle>

  <!-- Core circle -->
  <circle cx="715" cy="155" r="46" fill="#030b14">
    <animate attributeName="r" values="46;48;46" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="715" cy="155" r="46" fill="none" stroke="#00f0ff" stroke-width="1.2" stroke-opacity="0.5">
    <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Core text -->
  <text x="715" y="149" font-family="'Segoe UI Black',Arial,sans-serif" font-size="16" font-weight="900" fill="#ffffff" text-anchor="middle">MERN</text>
  <text x="715" y="165" font-family="Courier New,monospace" font-size="8" fill="#00f0ff" text-anchor="middle" letter-spacing="2.5">STACK</text>

  <!-- Orbiting dot 1 — cyan (outer ring) -->
  <g transform="translate(715, 155)">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="6s" repeatCount="indefinite"/>
      <circle cx="122" cy="0" r="5.5" fill="#00f0ff" filter="url(#gc)"/>
    </g>
  </g>

  <!-- Orbiting dot 2 — purple (middle ring), counter -->
  <g transform="translate(715, 155)">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="8s" repeatCount="indefinite"/>
      <circle cx="92" cy="0" r="4" fill="#7b2fff" filter="url(#gc)"/>
    </g>
  </g>

  <!-- Orbiting dot 3 — pink (inner ring) -->
  <g transform="translate(715, 155)">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="180" to="540" dur="5s" repeatCount="indefinite"/>
      <circle cx="64" cy="0" r="3.5" fill="#ff3cac" filter="url(#gc)"/>
    </g>
  </g>

  <!-- Second dot on outer ring (180deg offset) -->
  <g transform="translate(715, 155)">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="180" to="540" dur="6s" repeatCount="indefinite"/>
      <circle cx="122" cy="0" r="3" fill="#00f0ff" fill-opacity="0.5"/>
    </g>
  </g>

  <!-- Floating particles -->
  <circle cx="610" cy="80" r="2" fill="#00f0ff" fill-opacity="0.5">
    <animate attributeName="cy" values="80;68;80" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="fill-opacity" values="0.5;1;0.5" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="820" cy="238" r="2" fill="#7b2fff" fill-opacity="0.4">
    <animate attributeName="cy" values="238;226;238" dur="5s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="828" cy="90" r="1.5" fill="#ff3cac" fill-opacity="0.6">
    <animate attributeName="cy" values="90;78;90" dur="3.5s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="605" cy="220" r="1.5" fill="#00f0ff" fill-opacity="0.35">
    <animate attributeName="cy" values="220;210;220" dur="6s" begin="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="840" cy="160" r="2" fill="#ffd700" fill-opacity="0.3">
    <animate attributeName="cy" values="160;150;160" dur="4.5s" begin="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Tech labels orbiting (text near dots) -->
  <text x="837" y="156" font-family="Courier New,monospace" font-size="8" fill="#00f0ff" fill-opacity="0.5" text-anchor="middle">React</text>
  <text x="715" y="40" font-family="Courier New,monospace" font-size="8" fill="#7b2fff" fill-opacity="0.5" text-anchor="middle">Flask</text>
  <text x="610" y="270" font-family="Courier New,monospace" font-size="8" fill="#ff3cac" fill-opacity="0.5" text-anchor="middle">AI/ML</text>

</svg>
