<svg width="900" height="340" viewBox="0 0 900 340" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --bg: #030712;
      --bg-panel: rgba(255, 255, 255, 0.02);
      --border: rgba(255, 255, 255, 0.08);
      --border-active: rgba(0, 240, 255, 0.3);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --accent-1: #00f0ff;
      --accent-2: #a855f7;
      --accent-3: #f43f5e;
      --glow: drop-shadow(0px 0px 8px rgba(0, 240, 255, 0.4));
      --grid-opacity: 0.07;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #ffffff;
        --bg-panel: rgba(0, 0, 0, 0.02);
        --border: rgba(0, 0, 0, 0.08);
        --border-active: rgba(9, 105, 218, 0.3);
        --text-main: #1f2937;
        --text-muted: #6b7280;
        --accent-1: #0969da;
        --accent-2: #8b5cf6;
        --accent-3: #db2777;
        --glow: drop-shadow(0px 0px 6px rgba(9, 105, 218, 0.25));
        --grid-opacity: 0.04;
      }
    }

    .main-bg { fill: var(--bg); transition: fill 0.3s ease; }
    .panel { fill: var(--bg-panel); stroke: var(--border); transition: all 0.3s ease; }
    .text-main { fill: var(--text-main); font-family: 'Syne', 'Segoe UI', system-ui, sans-serif; transition: fill 0.3s ease; }
    .text-muted { fill: var(--text-muted); font-family: 'Outfit', 'Segoe UI', system-ui, sans-serif; transition: fill 0.3s ease; }
    .mono { font-family: 'Space Mono', monospace; }
    .accent-1 { fill: var(--accent-1); stroke: var(--accent-1); }
    .accent-2 { fill: var(--accent-2); }
    .accent-3 { fill: var(--accent-3); }

    /* Animations */
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.9; }
    }
    .pulsing { animation: pulse 3s infinite ease-in-out; }

    @keyframes rotate-clockwise {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes rotate-counter {
      from { transform: rotate(360deg); }
      to { transform: rotate(0deg); }
    }
    .rot-cw { animation: rotate-clockwise 25s linear infinite; transform-origin: 730px 170px; }
    .rot-ccw { animation: rotate-counter 15s linear infinite; transform-origin: 730px 170px; }

    @keyframes data-flow {
      0% { stroke-dashoffset: 24; }
      100% { stroke-dashoffset: 0; }
    }
    .flowing-path {
      stroke-dasharray: 8 4;
      animation: data-flow 1.5s linear infinite;
    }

    @keyframes float-y {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }
    .floating { animation: float-y 4s ease-in-out infinite; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    .cursor-blink { animation: blink 1.2s step-end infinite; }
  </style>

  <defs>
    <linearGradient id="gradient-title" x1="0" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="var(--accent-1)"/>
      <stop offset="100%" stop-color="var(--accent-2)"/>
    </linearGradient>
    <pattern id="grid-pattern" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="var(--text-main)" stroke-width="0.5" stroke-opacity="var(--grid-opacity)"/>
    </pattern>
    <clipPath id="rect-clip"><rect width="900" height="340" rx="16"/></clipPath>
  </defs>

  <!-- Background Base -->
  <rect width="900" height="340" rx="16" class="main-bg"/>
  <rect width="900" height="340" fill="url(#grid-pattern)" clip-path="url(#rect-clip)"/>

  <!-- Glowing background rings -->
  <circle cx="730" cy="170" r="160" fill="var(--accent-1)" fill-opacity="0.015"/>
  <circle cx="730" cy="170" r="110" fill="var(--accent-2)" fill-opacity="0.02"/>

  <!-- Left Side Interface Panel -->
  <rect x="35" y="35" width="530" height="270" rx="12" class="panel" />
  
  <!-- Interactive Corner Crosshairs -->
  <path d="M 35 55 L 35 35 L 55 35" stroke="var(--accent-1)" stroke-width="2" fill="none"/>
  <path d="M 545 35 L 565 35 L 565 55" stroke="var(--accent-2)" stroke-width="2" fill="none"/>
  <path d="M 35 285 L 35 305 L 55 305" stroke="var(--accent-2)" stroke-width="2" fill="none"/>
  <path d="M 545 305 L 565 305 L 565 285" stroke="var(--accent-1)" stroke-width="2" fill="none"/>

  <!-- Header Label / Terminal status -->
  <circle cx="65" cy="62" r="4" fill="var(--accent-1)"/>
  <circle cx="65" cy="62" r="4" fill="var(--accent-1)" class="pulsing"/>
  <text x="80" y="66" class="text-main mono" font-size="10" font-weight="700" letter-spacing="2">SYSTEM: ACTIVE</text>
  <text x="440" y="66" class="text-muted mono" font-size="9" text-anchor="end">LOC: IN_DELHI_IN // 28.6139° N</text>

  <!-- Divider line -->
  <line x1="55" y1="85" x2="545" y2="85" stroke="var(--border)" stroke-width="1"/>

  <!-- Name text with gradient and glow -->
  <text x="55" y="145" class="text-main" font-size="44" font-weight="800" letter-spacing="-1">Bhushan Ingale</text>
  
  <!-- Subtitle Terminal Prompt -->
  <text x="55" y="180" class="text-muted mono" font-size="13">&gt; Full Stack Developer &amp; AI/ML Builder</text>
  
  <!-- Running text list / keypoints -->
  <g transform="translate(55, 210)">
    <!-- Point 1 -->
    <path d="M0 -4 L6 0 L0 4 Z" fill="var(--accent-1)" />
    <text x="18" y="3" class="text-main" font-size="12" font-weight="600">30+ Apps Shipped</text>
    <text x="145" y="3" class="text-muted" font-size="12">across 3 major production suites</text>

    <!-- Point 2 -->
    <path d="M0 21 L6 25 L0 29 Z" fill="var(--accent-2)" />
    <text x="18" y="28" class="text-main" font-size="12" font-weight="600">AI/ML Integration</text>
    <text x="155" y="28" class="text-muted" font-size="12">incorporating active Scikit-Learn models</text>

    <!-- Point 3 -->
    <path d="M0 46 L6 50 L0 54 Z" fill="var(--accent-3)" />
    <text x="18" y="53" class="text-main" font-size="12" font-weight="600">Adaptive UI/UX</text>
    <text x="135" y="53" class="text-muted" font-size="12">optimized for responsive dark &amp; light modes</text>
  </g>

  <!-- Right Side Interactive Globe / Gear System -->
  <g class="floating">
    <!-- Outer Gear/Ring -->
    <circle cx="730" cy="170" r="105" fill="none" stroke="var(--border)" stroke-width="1.5" />
    <circle cx="730" cy="170" r="90" fill="none" stroke="var(--accent-1)" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="10 5" class="rot-cw" />
    
    <!-- Outer orbiting node -->
    <g class="rot-cw">
      <circle cx="820" cy="170" r="5" fill="var(--accent-1)" />
      <circle cx="820" cy="170" r="10" fill="none" stroke="var(--accent-1)" stroke-width="1" stroke-opacity="0.5"/>
    </g>

    <!-- Middle orbiting node -->
    <g class="rot-ccw">
      <circle cx="730" cy="80" r="4" fill="var(--accent-2)" />
      <line x1="730" y1="170" x2="730" y2="80" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="4 4" />
    </g>

    <!-- Center Console core -->
    <circle cx="730" cy="170" r="50" fill="var(--bg)" stroke="var(--accent-2)" stroke-width="2" style="filter: var(--glow);" />
    <circle cx="730" cy="170" r="44" fill="none" stroke="var(--border)" stroke-width="1" />
    
    <!-- Central Text -->
    <text x="730" y="165" class="text-main mono" font-size="11" font-weight="700" text-anchor="middle" letter-spacing="1">MERN</text>
    <text x="730" y="178" class="text-main mono" font-size="11" font-weight="700" text-anchor="middle" letter-spacing="1">FLASK</text>
    <text x="730" y="190" class="accent-1 mono" font-size="7" font-weight="700" text-anchor="middle" letter-spacing="0.5">DEV</text>
  </g>

  <!-- Ambient Light Stream Particles -->
  <circle cx="610" cy="70" r="2.5" fill="var(--accent-1)" fill-opacity="0.6">
    <animate attributeName="cy" values="70;55;70" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="840" cy="270" r="2" fill="var(--accent-2)" fill-opacity="0.5">
    <animate attributeName="cy" values="270;285;270" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="260" r="3" fill="var(--accent-3)" fill-opacity="0.4">
    <animate attributeName="cy" values="260;250;260" dur="6s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Flowing digital path connector -->
  <path d="M 565 170 L 680 170" stroke="var(--accent-1)" stroke-width="1.5" fill="none" class="flowing-path" stroke-opacity="0.4"/>
</svg>
