<svg width="900" height="340" viewBox="0 0 900 340" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --bg: #020408;
      --bg-panel: rgba(0, 240, 255, 0.03);
      --border: rgba(0, 240, 255, 0.15);
      --border-active: #00f0ff;
      --text-main: #e8f4f8;
      --text-muted: #4a6070;
      --accent-1: #00f0ff;
      --accent-2: #7b2fff;
      --accent-3: #ff3cac;
      --glow: drop-shadow(0px 0px 10px rgba(0, 240, 255, 0.5));
    }

    .main-bg { fill: var(--bg); }
    .panel { fill: var(--bg-panel); stroke: var(--border); stroke-width: 1; }
    .text-main { fill: var(--text-main); font-family: 'Syne', 'Segoe UI', system-ui, sans-serif; }
    .text-muted { fill: var(--text-muted); font-family: 'Outfit', 'Segoe UI', system-ui, sans-serif; }
    .mono { font-family: 'Space Mono', monospace; }
    .accent-1 { fill: var(--accent-1); }

    @keyframes pulse {
      0%, 100% { opacity: 0.25; }
      50% { opacity: 0.85; }
    }
    .pulsing { animation: pulse 3s infinite ease-in-out; }

    @keyframes rotate-clockwise {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .rot-cw { animation: rotate-clockwise 25s linear infinite; transform-origin: 730px 170px; }
    .rot-ccw { animation: rotate-clockwise 15s linear reverse infinite; transform-origin: 730px 170px; }

    @keyframes stream-down {
      0% { transform: translateY(-100%); opacity: 0; }
      10% { opacity: 0.35; }
      90% { opacity: 0.35; }
      100% { transform: translateY(100%); opacity: 0; }
    }
    .stream { animation: stream-down 8s linear infinite; }

    @keyframes glitch-anim {
      0%, 100% { transform: translate(0); }
      20% { transform: translate(-2px, 1px); }
      40% { transform: translate(1px, -1px); }
      60% { transform: translate(-1px, -1px); }
      80% { transform: translate(2px, 1px); }
    }
    .glitch { animation: glitch-anim 4s step-end infinite; }
  </style>

  <defs>
    <linearGradient id="title-grad" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="var(--accent-1)"/>
      <stop offset="100%" stop-color="var(--accent-2)"/>
    </linearGradient>
    <pattern id="cyber-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="var(--accent-1)" stroke-width="0.5" stroke-opacity="0.08"/>
    </pattern>
    <clipPath id="card-clip"><rect width="900" height="340" rx="16"/></clipPath>
  </defs>

  <!-- Forced Dark Background & Grid -->
  <rect width="900" height="340" rx="16" class="main-bg"/>
  <rect width="900" height="340" fill="url(#cyber-grid)" clip-path="url(#card-clip)"/>

  <!-- Background neon dust glow -->
  <circle cx="730" cy="170" r="150" fill="var(--accent-1)" fill-opacity="0.03" filter="blur(40px)"/>
  <circle cx="730" cy="170" r="90" fill="var(--accent-2)" fill-opacity="0.04" filter="blur(30px)"/>
  <circle cx="150" cy="150" r="120" fill="var(--accent-3)" fill-opacity="0.02" filter="blur(45px)"/>

  <!-- Cybernetic border frames -->
  <rect x="35" y="35" width="530" height="270" rx="8" class="panel" />
  
  <!-- Outer Corner Crosshairs -->
  <path d="M 35 55 L 35 35 L 55 35" stroke="var(--accent-1)" stroke-width="2" fill="none" style="filter: var(--glow);"/>
  <path d="M 545 35 L 565 35 L 565 55" stroke="var(--accent-2)" stroke-width="2" fill="none"/>
  <path d="M 35 285 L 35 305 L 55 305" stroke="var(--accent-2)" stroke-width="2" fill="none"/>
  <path d="M 545 305 L 565 305 L 565 285" stroke="var(--accent-1)" stroke-width="2" fill="none" style="filter: var(--glow);"/>

  <!-- Scanlines & Matrix Code Rain -->
  <g clip-path="url(#card-clip)" opacity="0.45">
    <g class="stream" style="animation-duration: 6s; transform: translateX(840px);">
      <text x="830" y="0" font-family="monospace" font-size="8.5" fill="var(--accent-1)" writing-mode="tb" letter-spacing="3">100101101001</text>
    </g>
    <g class="stream" style="animation-duration: 9s; animation-delay: 2s; transform: translateX(860px);">
      <text x="855" y="0" font-family="monospace" font-size="8.5" fill="var(--accent-2)" writing-mode="tb" letter-spacing="3">011010010110</text>
    </g>
  </g>

  <!-- Status indicator -->
  <circle cx="65" cy="62" r="3.5" fill="var(--accent-1)" style="filter: var(--glow);"/>
  <circle cx="65" cy="62" r="3.5" fill="var(--accent-1)" class="pulsing"/>
  <text x="78" y="66" class="text-main mono" font-size="9" font-weight="700" letter-spacing="2">SYSTEM: ONLINE</text>
  <text x="545" y="66" class="text-muted mono" font-size="8.5" text-anchor="end">// DEV_PORTAL_CONNECT</text>

  <!-- Name -->
  <g class="glitch">
    <text x="55" y="145" class="text-main" font-size="44" font-weight="900" fill="url(#title-grad)" style="filter: var(--glow); font-family: 'Syne', sans-serif;">Bhushan Ingale</text>
  </g>
  
  <text x="55" y="180" class="text-main mono" font-size="13" fill="var(--accent-1)">&gt; Full Stack Developer &amp; AI/ML Builder</text>

  <!-- Info lines -->
  <g transform="translate(55, 210)">
    <path d="M0 -3 L5 0 L0 3 Z" fill="var(--accent-1)"/>
    <text x="16" y="3" class="text-main" font-size="11.5" font-weight="600">30+ Web Applications Shipped</text>
    <text x="210" y="3" class="text-muted" font-size="11.5">built using modern MERN &amp; Flask architectures</text>

    <path d="M0 22 L5 25 L0 28 Z" fill="var(--accent-2)"/>
    <text x="16" y="28" class="text-main" font-size="11.5" font-weight="600">AI/ML Powered</text>
    <text x="116" y="28" class="text-muted" font-size="11.5">integrating predictions, CV scanners, &amp; NLP pipelines</text>
  </g>

  <!-- Stat Counters -->
  <g transform="translate(55, 268)">
    <text x="0" y="0" font-family="'Syne', sans-serif" font-size="20" font-weight="800" fill="var(--accent-1)">30+</text>
    <text x="0" y="12" class="text-muted mono" font-size="7" letter-spacing="1">PROJECTS</text>

    <text x="90" y="0" font-family="'Syne', sans-serif" font-size="20" font-weight="800" fill="var(--accent-2)">10</text>
    <text x="90" y="12" class="text-muted mono" font-size="7" letter-spacing="1">AI MODELS</text>

    <text x="180" y="0" font-family="'Syne', sans-serif" font-size="20" font-weight="800" fill="var(--accent-3)">3</text>
    <text x="180" y="12" class="text-muted mono" font-size="7" letter-spacing="1">SUITES</text>
  </g>

  <!-- Right side tech core -->
  <g class="rot-cw">
    <circle cx="730" cy="170" r="85" fill="none" stroke="var(--border)" stroke-width="1.2" stroke-dasharray="8 8"/>
  </g>
  <g class="rot-ccw">
    <circle cx="730" cy="170" r="68" fill="none" stroke="var(--accent-2)" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="15 5"/>
  </g>

  <!-- Central core -->
  <circle cx="730" cy="170" r="46" fill="#020408" stroke="var(--accent-1)" stroke-width="2.5" style="filter: var(--glow);"/>
  <text x="730" y="166" class="text-main mono" font-size="11" font-weight="800" text-anchor="middle" letter-spacing="0.5">CYBER</text>
  <text x="730" y="178" class="text-main mono" font-size="9" font-weight="700" fill="var(--accent-2)" text-anchor="middle" letter-spacing="2">DECK</text>

  <!-- Orbiting dots -->
  <g transform="translate(730, 170)">
    <g class="rot-cw">
      <circle cx="85" cy="0" r="4.5" fill="var(--accent-1)" style="filter: var(--glow);"/>
    </g>
    <g class="rot-ccw">
      <circle cx="-68" cy="0" r="3.5" fill="var(--accent-3)"/>
    </g>
  </g>

</svg>
