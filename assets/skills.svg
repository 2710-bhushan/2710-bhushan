<svg width="900" height="220" viewBox="0 0 900 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#020408"/><stop offset="100%" stop-color="#060e1a"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00f0ff"/><stop offset="50%" stop-color="#7b2fff"/><stop offset="100%" stop-color="#ff3cac"/>
    </linearGradient>
    <filter id="gc" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00f0ff" stroke-width="0.3" stroke-opacity="0.06"/>
    </pattern>
    <clipPath id="card"><rect width="900" height="220" rx="10"/></clipPath>
  </defs>

  <rect width="900" height="220" rx="10" fill="url(#bg)"/>
  <rect width="900" height="220" fill="url(#grid)" clip-path="url(#card)"/>
  <rect width="900" height="1.5" fill="url(#lineGrad)" opacity="0.6"/>
  <rect y="218.5" width="900" height="1.5" fill="url(#lineGrad)" opacity="0.3"/>

  <!-- Section label -->
  <rect x="40" y="24" width="22" height="1" fill="#00f0ff" opacity="0.7"/>
  <text x="70" y="29" font-family="Courier New,monospace" font-size="9.5" fill="#00f0ff" fill-opacity="0.75" letter-spacing="3.5">TECH STACK</text>
  <text x="40" y="60" font-family="'Segoe UI Black',Arial,sans-serif" font-size="30" font-weight="900" fill="#ffffff" fill-opacity="0.92" letter-spacing="-0.5">Skills &amp;</text>
  <text x="196" y="60" font-family="'Segoe UI Black',Arial,sans-serif" font-size="30" font-weight="900" fill="#00f0ff" letter-spacing="-0.5" filter="url(#gc)">Technologies</text>

  <!-- ── ROW 1: Frontend ── -->
  <!-- React -->
  <rect x="40" y="78" width="76" height="64" rx="6" fill="#00f0ff" fill-opacity="0.05" stroke="#00f0ff" stroke-width="0.5" stroke-opacity="0.25">
    <animate attributeName="stroke-opacity" values="0.25;0.6;0.25" dur="3s" begin="0s" repeatCount="indefinite"/>
  </rect>
  <text x="78" y="104" font-family="'Segoe UI',Arial,sans-serif" font-size="22" fill="#61dafb" text-anchor="middle">⚛</text>
  <text x="78" y="131" font-family="Courier New,monospace" font-size="8" fill="#61dafb" fill-opacity="0.7" text-anchor="middle" letter-spacing="0.5">React</text>

  <!-- Next.js -->
  <rect x="126" y="78" width="76" height="64" rx="6" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.2">
    <animate attributeName="stroke-opacity" values="0.2;0.5;0.2" dur="3s" begin="0.3s" repeatCount="indefinite"/>
  </rect>
  <text x="164" y="104" font-family="'Segoe UI Black',Arial,sans-serif" font-size="16" font-weight="900" fill="#ffffff" fill-opacity="0.85" text-anchor="middle">N</text>
  <text x="164" y="131" font-family="Courier New,monospace" font-size="8" fill="#ffffff" fill-opacity="0.5" text-anchor="middle">Next.js</text>

  <!-- Vue -->
  <rect x="212" y="78" width="76" height="64" rx="6" fill="#42b883" fill-opacity="0.05" stroke="#42b883" stroke-width="0.5" stroke-opacity="0.22">
    <animate attributeName="stroke-opacity" values="0.22;0.55;0.22" dur="3s" begin="0.6s" repeatCount="indefinite"/>
  </rect>
  <text x="250" y="106" font-family="'Segoe UI',Arial,sans-serif" font-size="20" fill="#42b883" text-anchor="middle">◈</text>
  <text x="250" y="131" font-family="Courier New,monospace" font-size="8" fill="#42b883" fill-opacity="0.7" text-anchor="middle">Vue.js</text>

  <!-- Tailwind -->
  <rect x="298" y="78" width="76" height="64" rx="6" fill="#06b6d4" fill-opacity="0.05" stroke="#06b6d4" stroke-width="0.5" stroke-opacity="0.22">
    <animate attributeName="stroke-opacity" values="0.22;0.55;0.22" dur="3s" begin="0.9s" repeatCount="indefinite"/>
  </rect>
  <text x="336" y="106" font-family="'Segoe UI',Arial,sans-serif" font-size="18" fill="#06b6d4" text-anchor="middle">≋</text>
  <text x="336" y="131" font-family="Courier New,monospace" font-size="8" fill="#06b6d4" fill-opacity="0.7" text-anchor="middle">Tailwind</text>

  <!-- Flask -->
  <rect x="384" y="78" width="76" height="64" rx="6" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.18">
    <animate attributeName="stroke-opacity" values="0.18;0.45;0.18" dur="3s" begin="1.2s" repeatCount="indefinite"/>
  </rect>
  <text x="422" y="106" font-family="'Segoe UI',Arial,sans-serif" font-size="20" fill="#ffffff" fill-opacity="0.7" text-anchor="middle">🌶</text>
  <text x="422" y="131" font-family="Courier New,monospace" font-size="8" fill="#ffffff" fill-opacity="0.45" text-anchor="middle">Flask</text>

  <!-- Django -->
  <rect x="470" y="78" width="76" height="64" rx="6" fill="#092e20" fill-opacity="0.4" stroke="#44b78b" stroke-width="0.5" stroke-opacity="0.2">
    <animate attributeName="stroke-opacity" values="0.2;0.5;0.2" dur="3s" begin="1.5s" repeatCount="indefinite"/>
  </rect>
  <text x="508" y="106" font-family="'Segoe UI',Arial,sans-serif" font-size="20" fill="#44b78b" text-anchor="middle">🎸</text>
  <text x="508" y="131" font-family="Courier New,monospace" font-size="8" fill="#44b78b" fill-opacity="0.7" text-anchor="middle">Django</text>

  <!-- Python -->
  <rect x="556" y="78" width="76" height="64" rx="6" fill="#3572a5" fill-opacity="0.08" stroke="#3572a5" stroke-width="0.5" stroke-opacity="0.3">
    <animate attributeName="stroke-opacity" values="0.3;0.65;0.3" dur="3s" begin="1.8s" repeatCount="indefinite"/>
  </rect>
  <text x="594" y="106" font-family="'Segoe UI',Arial,sans-serif" font-size="20" fill="#ffe873" text-anchor="middle">🐍</text>
  <text x="594" y="131" font-family="Courier New,monospace" font-size="8" fill="#3572a5" fill-opacity="0.8" text-anchor="middle">Python</text>

  <!-- MongoDB -->
  <rect x="642" y="78" width="76" height="64" rx="6" fill="#00ed64" fill-opacity="0.04" stroke="#00ed64" stroke-width="0.5" stroke-opacity="0.22">
    <animate attributeName="stroke-opacity" values="0.22;0.55;0.22" dur="3s" begin="2.1s" repeatCount="indefinite"/>
  </rect>
  <text x="680" y="106" font-family="'Segoe UI',Arial,sans-serif" font-size="20" fill="#00ed64" text-anchor="middle">🍃</text>
  <text x="680" y="131" font-family="Courier New,monospace" font-size="8" fill="#00ed64" fill-opacity="0.65" text-anchor="middle">MongoDB</text>

  <!-- Docker -->
  <rect x="728" y="78" width="76" height="64" rx="6" fill="#2496ed" fill-opacity="0.06" stroke="#2496ed" stroke-width="0.5" stroke-opacity="0.22">
    <animate attributeName="stroke-opacity" values="0.22;0.55;0.22" dur="3s" begin="2.4s" repeatCount="indefinite"/>
  </rect>
  <text x="766" y="106" font-family="'Segoe UI',Arial,sans-serif" font-size="20" fill="#2496ed" text-anchor="middle">🐳</text>
  <text x="766" y="131" font-family="Courier New,monospace" font-size="8" fill="#2496ed" fill-opacity="0.7" text-anchor="middle">Docker</text>

  <!-- Git/GitHub -->
  <rect x="814" y="78" width="68" height="64" rx="6" fill="#f05032" fill-opacity="0.05" stroke="#f05032" stroke-width="0.5" stroke-opacity="0.22">
    <animate attributeName="stroke-opacity" values="0.22;0.55;0.22" dur="3s" begin="2.7s" repeatCount="indefinite"/>
  </rect>
  <text x="848" y="106" font-family="'Segoe UI',Arial,sans-serif" font-size="20" fill="#f05032" text-anchor="middle">⑂</text>
  <text x="848" y="131" font-family="Courier New,monospace" font-size="8" fill="#f05032" fill-opacity="0.7" text-anchor="middle">Git</text>

  <!-- Bottom row labels -->
  <text x="40" y="168" font-family="Courier New,monospace" font-size="8" fill="#00f0ff" fill-opacity="0.4" letter-spacing="1">Frontend</text>
  <text x="383" y="168" font-family="Courier New,monospace" font-size="8" fill="#7b2fff" fill-opacity="0.4" letter-spacing="1">Backend</text>
  <text x="555" y="168" font-family="Courier New,monospace" font-size="8" fill="#ff3cac" fill-opacity="0.4" letter-spacing="1">AI/ML</text>
  <text x="727" y="168" font-family="Courier New,monospace" font-size="8" fill="#ffd700" fill-opacity="0.4" letter-spacing="1">DevOps</text>

  <!-- Also: Java, Node, MySQL, AWS, scikit-learn mini-tags -->
  <text x="40" y="192" font-family="Courier New,monospace" font-size="9" fill="#00f0ff" fill-opacity="0.45">+ Java · Node.js · MySQL · AWS · TypeScript · scikit-learn · NLP · Computer Vision · Linux · Postman</text>
</svg>
